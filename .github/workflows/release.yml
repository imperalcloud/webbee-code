name: release

# Publish to PyPI on a version tag (e.g. `v0.1.0`). Uses PyPI Trusted
# Publishing (OIDC) — no API token stored in the repo. Configure the trusted
# publisher once at pypi.org → project `webbee` → Publishing:
#   owner=imperalcloud  repo=webbee-code  workflow=release.yml  env=(none)

on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
