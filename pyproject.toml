[project]
name = "webbee"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["imperal-mcp>=0.4.0", "imperal-sdk>=5.9.2", "httpx>=0.27", "httpx-sse>=0.4", "rich>=13.7"]

[project.scripts]
webbee = "webbee.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/webbee"]

[tool.pytest.ini_options]
pythonpath = ["src"]
asyncio_mode = "auto"
